尊同大比丘衆遊向古魯沓河下河飲水沐浴然後上岸返回芒果園去佛召純陀告曰純陀將僧伽利四折為我敷座純陀我疲憊欲臥如是世尊純陀應諾即為世尊四折僧伽利衣敷座獻上世尊右脅朝下左足纍置右足之上作獅子臥正念正智思維起想純陀坐於世尊近前天下無可比世尊如來佛疲憊衰弱甚來至古魯河下至河水中河水極清徹沐浴飲水後返回芒果林比丘所擁簇世尊為率領佛法創立者為仙為賢聖告訴純陀曰僧衣四重折我今欲側臥疲憊難支撐純陀應聲是折衣為四重世尊確疲憊即刻側身臥純陀坐近前守護世尊側爾時世尊告阿難曰阿難會有人對鐵匠之子純陀說純陀如來最後是用了你供的齊食而涅槃的純陀聽後會悔恨惱喪阿難汝當排除純陀之悔恨惱喪心情而對他說如來最後用了汝之齊飯而入涅槃於汝有利此乃我於佛所親耳所聞我在佛前當面領受佛曰有兩種供食果報最佳功德最大兩種云何一種供食用已如來成無上正等正覺一種供食用已如來證無餘涅槃此二種供食果報最善最大純陀尊者由此已積長壽業已積顏色美好業已積生天業已積權勢增長業阿難汝當如此排除鐵匠之子純陀之悔恨惱喪爾時世尊如是知已即興而說布施與捐贈可增慈善心持戒調伏者不存怨與恨有智有慧者遠離諸種惡涅槃證得時貪瞋癡斷盡六波吒離村人經如是我聞一時世尊與大比丘衆在摩揭陀國遊化到達波吒離村時波吒離村優婆塞來至佛所行禮已畢坐於一旁而白世尊言大德世尊請接受我等供養堂捨世尊默允波吒離優婆塞即從座起右繞禮佛即往堂捨去既至即鋪設敷物安置座位擺放水罐油燈而後又返回佛所敬禮已畢站立一旁而白佛言大德世尊堂捨中鋪設已畢座位水罐油燈已備請世尊往今正是時世尊即著衣持鉢同大比丘衆往至堂捨既至即洗足而入背靠中柱面東而坐比丘衆亦洗足入內背靠後壁圍繞世尊面東而坐波吒離村優婆塞亦洗足入內背靠東壁面西而坐爾時世尊告波吒離村諸優婆塞曰諸位施主破戒者得五種罪患何云為五破戒者不守戒規放逸揮霍此為破戒者第一罪患復次破戒者罪名流布此為破戒者第二罪患復次破戒者入於大衆所謂剎帝利衆婆羅門衆居士衆沙門衆自感慚羞此為破戒者第三罪患復次破戒者迷惑致死此為破戒者第四罪患復次破戒者死後墜入惡生地獄此為破戒者第五罪患諸居士破戒者有此五種罪患諸居士持戒者守持淨戒有五種功德何云為五因其持戒精進必積大財此為持戒者第一功德復次持戒者持淨戒必得稱譽此為持戒者第二功德復次持淨戒者入於大衆如剎帝利衆婆羅門衆居士衆沙門衆無有慚愧恐懼此為持戒者第三功德復次持戒者死時不迷惑此為持戒者第四功德復次持戒者持淨戒死後必生善趣入天界此為持戒者第五種功德諸居士這便是持戒者持淨戒當得之五種功德爾時世尊以法語開示波吒離村優婆塞衆使其信受精進喜悅說法已告曰諸居士今時已晚汝等當去時波吒離村諸居士歡喜信受即從座起敬禮右繞而去波吒離村居士離去未久世尊即入空室爾時摩揭陀國大臣須尼陀和婆沙迦羅欲於波吒離村建立城防以御離車諸王時有數千天神守護波吒離村財産物品國中高級王公大臣欲於有高級天神守護之地建立宅舍中級王公大臣欲於中級天神守護之地建立宅舍下級王公大臣欲於下級天神守護之地建立宅舍時世尊以超人之淨眼觀見此一切世尊如是見已於黎明時分起身問阿難曰阿難誰欲在波吒離村建立城防阿難答曰大德世尊摩揭陀國大臣須尼陀和婆沙迦羅欲於波吒離村建立城防以御離車諸王世尊曰阿難是摩揭陀國大臣須尼陀和婆沙迦羅與忉利天諸天神商議在波吒離村建造城防以御離車諸王阿難我已以超人天眼觀見將有數千天神守護此城國中高級王公大臣欲在高級天神守護之地區建造宅舍中級王公大臣欲在中級天神守護之地區建造宅舍下級王公大臣欲在下級天神守護之地區建造宅舍阿難新建之波吒離城中將有聖者住地有商業區各地貨品將集於此將有甚大場地供其開箱理貨阿難將建之波吒離城將遭三災火水和內亂未久摩揭陀國大臣須尼陀和婆沙迦羅來至佛所問候言歡問候言歡已站立一旁而白世尊言大德喬答摩及比丘衆今日請受我齊供世尊默然應允二大臣知佛已受請即返其家準備上好嚼食和食品往請世尊大德喬答摩齊已具備今正是時請來應供爾時朝時世尊與大比丘衆著衣持鉢往摩揭陀國大臣須尼陀和婆沙迦羅家既至坐於已備之座位摩揭陀國大臣須尼陀和婆沙迦羅親以食供奉食已世尊移手出鉢時須尼陀與婆沙迦羅守於近旁坐於矮位之上世尊隨喜即興說偈假若某地區有某賢達居賢達所供者必善持戒律修習諸梵行並能自調御若有守護神當為作功德神既受尊崇必然護其所人得神護愛如子受母慈得神護佑者總見吉祥事世尊說此偈已即從座起踏上歸途須尼陀和婆沙迦羅跟隨其後並說今日沙門喬答摩行出何門其門則名為喬答摩門過恆河何渡口則名該渡口為喬答摩渡口爾時世尊所經之門果被命名為喬答摩門世尊到恆河邊時河水漲滿乃至烏鴉立於河岸便可飲及河水欲渡河者或求舟船或尋木筏時世尊及比丘衆於手臂伸屈之頃刻即從此岸消失而到達彼岸爾時世尊見許多欲渡者即興而說欲渡輪回海或渡愛欲河須過聖道橋以不沾泥濁若過小河溝亦需木筏做慧人有聖道無依自渡過七歧路經如是我聞一時世尊與隨從僧那伽薩瑪拉尊者遊行於憍薩羅大道之上時那伽薩瑪拉尊者見一歧路而白佛言大德世尊那是一條路我等可同行彼路世尊告那伽薩瑪拉曰那伽薩瑪拉應走之路此路也我等同行此路那伽薩瑪拉如是再說大德世尊那是一條路我等可同行彼路如是乃至三說世尊亦如是再告那伽薩瑪拉尊者那伽薩瑪拉應走之路此路也我等同行此路乃至三告時那伽薩瑪拉尊者便將世尊之衣鉢置於地上道一聲此是世尊之衣鉢便沿彼路行去時那伽薩瑪拉於途中遭遇賊寇被拳打腳踢鉢被打破僧伽利衣被撕毀那伽薩瑪拉持破衣破鉢往見世尊禮世尊已坐於一旁而白世尊言大德世尊我沿彼路行時遇賊寇遭歐打鉢被打破衣被撕毀爾時世尊如是知已即興而說智者與無智同行亦共住智者知真諦總能遠謬誤如鷸飲奶汁總將水排除八毗捨佉經如是我聞一時世尊在捨衛城東園彌伽羅母講堂住時彌伽羅母毗捨佉所喜愛之孫女去世毗捨佉衣服濡濕頭髮濡濕於午時至佛所禮佛已坐於一旁世尊問毗捨佉曰毗捨佉汝如此將衣髮濡濕於此午時從何處來此毗捨佉答言大德世尊我心愛之孫女亡故因此之故我濡濕衣髮於午時來此世尊又問毗捨佉汝願得衆多子孫如捨衛城人數否毗捨佉答言大德世尊我願得衆多子孫如舍衛城人數世尊問毗捨佉捨衛城人每日死亡多少毗捨佉答言捨衛城人每日死亡人數或十或九或八或七或六或五或四或三或二或一舍衛城死人不止無有定數世尊問曰毗捨佉如是汝能得一日不濡濕衣髮否毗捨佉答言如是世尊不能我無需這般多子孫世尊曰毗捨佉有百愛者有百苦者有九十愛者有九十苦者有八十愛者有八十苦者有七十愛者有七十苦者有六十愛者有六十苦者有五十愛者有五十苦者有四十愛者有四十苦者有三十愛者有三十苦者有二十愛者有二十苦者有十愛者有十苦者有九愛者有九苦者有八愛者有八苦者有七愛者有七苦者有六愛者有六苦者有五愛者有五苦者有四愛者有四苦者有三愛者有三苦者有二愛者有二苦者有一愛者有一苦者無有愛者則無有苦無有憂無有煩惱無有辛勞痛苦爾時世尊如是說已即興而說偈世間多憂愁悲傷與痛苦所有這一切均有愛生出一旦無愛時憂愁悲苦無無有所愛者可為安樂人無憂無煩惱清淨無垢塵九陀驃經一如是我聞一時世尊在王舍城竹林迦蘭陀迦園住時末羅子陀驃尊者至世尊所既至禮佛已坐於一旁而白佛言大德世尊今正是我般涅槃之時世尊曰今正是時汝當知時爾時陀驃即從座起行右繞禮世尊已即上升虛空結跏趺坐修火遍入四禪從定中起而入般涅槃般涅槃後身被火化無有餘燼如燃酥油麻油而不留灰燼一般爾時世尊如是知已即興而說色身已壞已諸想已滅已諸受已冷卻諸行皆入寂諸識無所住同滅無剩餘十陀驃經二如是我聞一時世尊在舍衛城祇樹給孤獨園住時世尊召喚比丘衆比丘衆應諾已世尊告比丘衆曰諸比丘末羅子陀驃上升虛空結跏趺坐修火遍入四禪從定中起而入般涅槃身軀火化無有灰燼如燃酥油麻油而不留灰燼一般爾時世尊如是說已即興而說偈鐵棒擊出火火星漸熄沒沒後無所存不見亦無著愛結斷除去暴流亦渡過無趣無所餘達到涅槃樂第八品波吒離村人品終本品總攝十經一涅槃經一二涅槃經二三涅槃經三四涅槃經四五純陀經六波吒離村人經七歧路經八毗捨佉經九陀驃經一十陀驃經二

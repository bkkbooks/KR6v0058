雨季安居期間皆得三明時世尊住捨衛城已向吠捨離遊去至吠捨離住大林精舍時世尊心中已知住阿古姆達河岸諸比丘情形即告阿難曰阿難瓦古姆達河岸住有諸比丘那裏已有光向我阿難汝遣一使者去瓦古姆達河岸告諸比丘師有召請阿難應聲如是世尊即去一比丘處對該比丘曰壽者汝去阿古姆達河岸比丘住處對彼比丘言師欲召見比丘應聲而去彈指之間便到達瓦古姆達河岸諸比丘處對諸比丘曰師召諸位尊者師欲見諸位尊者如是尊者諸比丘應諾一聲即收拾坐臥具整理衣鉢離開瓦古姆達河岸彈指之間來到大林精舍世尊住所爾時世尊入於不動三昧諸比丘思忖世尊此時修住何處得知世尊入於不動三昧時便亦皆入於不動三昧至天黑以後初夜已過阿難雙手合十向世尊禮拜然後披著袈裟白世尊曰大德世尊初夜已過現已夜深遠來諸僧恭候已久請世尊與之談說阿難如是白世尊已世尊仍是默然不語阿難再次雙手合十向世尊禮拜白世尊曰大德世尊初夜已過現已夜深遠來諸僧恭候已久請世尊與之談說阿難白世尊已世尊仍是默然待天至黎明旭日初升阿難即從座起雙手合十舉過頭頂向佛行禮並白佛言大德世尊黑夜已過天即黎明遠來比丘恭候已久請世尊與之談說爾時世尊即出定坐起告阿難曰阿難汝若已知當不至如此阿難我與五百比丘已同入不動三昧世尊如是告已即興而說拔除貪之刺戰勝辱暴縛如山不動搖無論樂與苦四舍利弗經如是我聞一時世尊在捨衛城祇樹給孤獨園住時舍利弗尊者於距佛不遠處結跏趺坐上身端直心入於定時世尊見舍利弗於不遠處結跏趺坐上身端直心入於定爾時世尊如是見已即興而說石山穩不動比丘亦應同斷除癡暗後如山穩不動五拘律陀經如是我聞一時世尊在舍衛城祇樹給孤獨園住時大目犍連尊者在距佛不遠處結跏趺坐上身端直內住正念爾時世尊見大目犍連在不遠處結跏趺坐上身端直內住正念爾時世尊如是見已即興而說身住於正念常入於定中守護諸觸處涅槃自可證六畢陵迦經如是我聞一時世尊在王舍城竹林迦蘭陀園住時有畢陵迦婆蹉尊者常呼比丘為賤人時諸比丘往至佛所禮拜已畢坐於一旁白世尊言大德畢陵迦婆蹉尊者常呼諸比丘為賤人時世尊告一比丘曰比丘汝過來汝如我所說告畢陵迦婆蹉比丘師召汝往比丘應諾如是世尊即往畢陵迦婆蹉所既至告畢陵迦婆蹉言師召汝往畢陵迦婆蹉應一聲如是壽者即到佛所禮世尊已坐在一旁世尊告畢陵迦婆蹉曰婆蹉聞汝常呼諸比丘為賤人有此事否畢陵迦婆蹉答言如是世尊爾時世尊思維畢陵迦婆蹉之往世情形而後告諸比丘曰諸比丘汝等不當怪罪婆蹉比丘婆蹉並未以瞋怒之心呼汝等為賤人婆蹉比丘過去五百世連續不斷生於婆羅門家庭呼人為賤人已成習氣以此習氣故婆蹉才呼汝等為賤人爾時世尊如是告已即興而說人若無欺詐無慢無貪心無我亦無欲心寂無怒瞋如是之人者名為婆羅門名為真比丘名為真沙門七迦葉經如是我聞一時世尊在王舍城竹林迦蘭陀園住時大迦葉尊者在畢鉢羅窟單跏趺坐入一三昧經七日七日後從定起出定後心想我當到王舍城乞食時有五百天神踊躍上前供奉食品大迦葉謝絶所供於朝時著衣持鉢入王舍城乞食時帝釋天欲供大迦葉齊食即化為紡織工紡紗阿修羅女穿梭織布大迦葉尊者在王舍城挨戶乞食來至帝釋天化身處帝釋天化身見大迦葉尊者走來出門往迎接鉢入室以米飯及諸類菜肴上等汁液盛滿一鉢獻給大迦葉時大迦葉自忖此人是誰有諾大威力定是帝釋天無疑大迦葉如是知已明告帝釋天曰帝釋此汝所為此後不可再如此行事帝釋天言大德大迦葉我等亦需積德亦當行善言已行右繞之禮而後升入天空帝釋欣喜於空中自說最上齊食已施豫大迦葉最上齊食已施豫大迦葉最上齊食已施豫大迦葉爾時世尊以超人之清淨天耳聽到帝釋於空中所說之感興語即興而說比丘托鉢乞以此養自己持齊勤修行正念持不離寂靜遠世法天神表敬意八托鉢經如是我聞一時世尊在舍衛城祇樹給孤獨長者園住時諸比丘乞食已回齊飯用畢聚於迦利樹園堂而共同談敘諸位壽者托鉢乞食之比丘在遊行托鉢時常可見悅目之色聽悅耳之音聞悅意之香嘗悅意之味得悅意之觸諸位壽者乞食比丘可得供養受禮敬尊崇故人為此而托鉢我等亦當堅持托鉢以常見悅目之色聽悅耳之音聞悅意之香嘗悅意之味得悅意之觸可得供養受禮敬尊崇諸比丘如是議論未能終止爾時已夕世尊從定中坐起至迦利樹園堂敷座而坐問比丘曰汝等聚此作何言說而未終止衆比丘答言大德世尊我等乞食既回齊飯用畢聚於此迦利樹園堂共同談論托鉢乞食者在遊行托鉢時常可見悅目之色聽悅耳之音聞悅意之香嘗悅意之味得悅意之觸可得供養受禮敬尊崇我等議論未終止時世尊至此世尊告曰諸比丘汝等是族姓子正信出家發此議論甚不應該諸比丘聚於一處當做之事僅二一是談說法語二是保持聖者之沉默爾時世尊如是說已即興而說偈曰比丘托鉢乞不求人讚譽托鉢無他求祇為養自已不為世法動天神表敬意九技藝經如是我聞一時世尊在捨衛城祇樹給孤獨園住時衆比丘托鉢已回齊食已畢在室內共坐閒談談及如下之事諸位尊者誰懂技藝何藝最高誰習何藝有比丘言御象之技最高有比丘說御馬之技最高有比丘說駕車之技最高有比丘說射箭之技最高有比丘說武術最高有比丘說印契之技最高有比丘說數學最高有比丘說書法最高有比丘說詩歌最高有比丘說詭辨最高有比丘說應辨最高如此談論未有終止時至傍晚世尊從定中起至衆比丘處敷座而坐問比丘曰諸比丘今汝等聚此談論何事而未終止衆比丘答言大德我等托鉢回齊食已共坐攀談談及誰懂技藝諸技之中以何為最高誰習何藝有說御家之技最高有說應辨之術最高談未終止世尊至此世尊曰諸比丘汝等是族姓子虔誠出家不當談論此等話題汝等聚於一處當做者唯二事一是談說法語二是保持聖者之沉默爾時世尊如是說己即興而說不以技為生輕安無負重諸根得調伏利益天人衆無欲無我執解脫無俗行無慢善獨處名為比丘僧十觀世經如是我聞一時世尊在優樓維羅尼連禪河岸菩提樹下初成正覺時世尊單跏趺坐享解脫之樂經於七日七日之後世尊從定中起以佛眼觀察世界世尊以佛眼觀見世界諸有情或因貪欲或因瞋恚或因癡愚而受諸熱惱受諸悲苦爾時世尊如是觀已即興而說世間生熱苦諸苦遍世處人間有通病以苦為幸福人雖有所願事實卻異殊人雖有所欲事常與願違愛則生恐懼恐懼生苦悲若能持梵行有助脫輪回沙門婆羅門說有持常見雖稱已離有其實並不然沙門婆羅門說無持斷見雖稱已離有其實並不然貪蘊必生苦取斷苦不生世人因無明貪愛煩惱生如是之有情離苦不可能貪愛等諸有遍於一切處諸有皆無常無常而皆苦正智知如是貪有必可斷正道斷諸貪貪滅即涅槃沙門得涅槃無取無輪回戰勝諸魔羅可得羅漢位第三品難陀品終本品總攝十經一業經二難陀經三耶輸闍經四舍利弗經五拘律陀經六畢陵迦經七迦葉經八托鉢經九技藝經十觀世經第四品彌凱耶品一彌凱耶經如是我聞一時世尊在賈利卡城附近的賈利山住時彌凱耶尊者為佛之侍者彌凱耶尊者到佛所禮敬已畢站立一旁白世尊言大德世尊我欲去江都村乞食世尊曰現正是時彌凱耶彌凱耶尊者著衣持鉢入江都村行乞從江都村托鉢回齊食已來到金米卡拉河邊在河邊漫步休息爾時彌凱耶尊者見一片惹人喜愛的芒果林心想此芒果林委實可愛是族姓子修行的理想處所世尊如若應允我欲來此精勤修習彌凱耶尊者如是想已來至佛所行禮已畢坐在一旁白世尊言大德我於朝時著衣持鉢入江都村乞食托鉢回齊食已到金米卡拉河邊漫步休息時見一片芒果林甚是可愛心想如若世尊應允我願到那裏精勤修習彌凱耶尊者如是白世尊已世尊曰彌凱耶汝若去我則獨居汝可暫留至另比丘來此接替彌凱耶尊者再白世尊言大德世尊世尊已無當做之事而我卻有事當做若世尊應允我當往彼芒果林勤奮修習彌凱耶尊者如是白世尊已世尊曰彌凱耶汝既說勤奮修習我尚復何言彌凱耶現正當其時汝可行當做之事時彌凱耶從座而起右繞禮佛即往芒果林去進入林中於一棵樹下休息彌凱耶住於芒果林中卻生出欲念瞋念害念之三惡念時彌凱耶尊者甚感奇怪怪哉怪哉昔所未有我虔誠出家卻住於三惡念中於夕時彌凱耶從定中起往世尊所行禮已畢坐在一旁白世尊言大德世尊我在芒果林住卻生出欲念瞋念害念之三惡念這使我驚奇我虔誠出家卻住於三惡念中世尊曰彌凱耶有五法可治汝心何謂五法彌凱耶比丘有善知識善友此為第一法守持戒律遵守解脫戒規行持圓滿縱使小過亦畏懼不犯精修學處此為第二法復次有少欲之足之語喜樂語間靜語獨處語精進語戒語定語慧語解脫語有利於斷除煩惱蓋障有利於厭惡輪回之苦有利於滅除貪欲有利於得菩提證涅槃多聽此類話語為第三法復次彌凱耶比丘應勇猛精進增強善法遠離不善法此為第四法復次彌凱耶比丘應有智慧應以智慧觀察生滅正觀苦滅此為第五法彌凱耶有善知識有善友可望得此守持戒律修習學處排除煩惱可望得此精進不捨善業正觀苦滅可望得此彌凱耶除此五法之外還須增修四法應修不淨觀以除貪愛應修慈悲觀以除瞋恨應修數息觀以除疑惑應修無常觀以除傲慢彌凱耶得無常想者則決無我執得無我想者必可滅除我慢如此當世可證涅槃爾時世尊如是說已即興說偈小念及細念存留於心間無明不自知必使輪回延正念精進者以慧除諸念知諦佛弟子諸念連根斷二高慢經如是我聞一時世尊住於拘尸那羅城末羅族之烏帕瓦得那莎羅林時有衆多比丘住於離佛不遠之林間房舍中他們高慢浮躁多語迷惑不自覺心不專一慌恐不安爾時世尊見諸比丘衆高慢浮躁多語迷惑不自覺心不專一慌恐不安住於不遠處之林間房舍中爾時世尊如是見已即興而說不能攝護身邪見必入侵惛沉唯欲睡必被魔羅擒若善護其心思惟正而純惛睡能克服惡趣可捨盡三牧牛人經如是我聞一時世尊同比丘衆在憍薩羅國遊化爾時世尊離開道路到一棵樹下敷座而坐時有一牧牛人到世尊所禮世尊已坐在一旁佛以法語向其講說使其信受奮發喜悅牧牛人聽佛法語受佛教誨心生信念奮發喜悅而白佛言大德世尊請於明日同比丘衆受我供養世尊默然應允牧牛人知世尊已應即從座起向世尊行右繞之禮而自離去夜時過去牧牛人在家中備好稠奶飯酥油稟報世尊大德飯已備好今正是時請來用齊於朝時分世尊著衣持鉢攜比丘衆到牧牛人家敷座而坐牧牛人以稠奶飯鮮酥油供佛及諸比丘世尊飯食已牧牛人於一旁低座坐下世尊又以法語向其講說使其信受奮發喜悅然後從座而起回到佛所世尊離去未久一男人入牧牛人家殺牧牛人死時衆比丘至佛所行禮已坐在一旁白世尊言大德今天牧牛人以奶飯酥油供佛及我等比丘衆我們離開未久一男人闖入將牧牛人殺死世尊如是知已即興而說敵人對敵人仇冤對仇冤一方被傷害報復必更殘四月明經如是我聞一時世尊於王舍城竹林迦蘭陀園住舍利弗尊者和大目犍連尊者在鴿山住時舍利弗尊者新剃頭髮在月明之夜於露天打坐入定時有二夜叉為友因事自北而南行二夜叉見舍利弗尊者新剃頭髮在月明之夜於露天打坐入定一夜叉告其友曰朋友我欲擊此沙門頭友言朋友不可汝莫如此此沙門是一位大德有大神通大威力夜叉再對友言朋友我仍欲擊此沙門頭友再阻不可汝莫如此此沙門是一位大德有大神通大威力夜叉三對友言朋友我仍欲擊此沙門頭友三阻不可汝莫如此此沙門是一位大德有大神通大威力爾時夜叉不聽友勸阻擊舍利弗尊者頭此一擊能使七肘乃至八肘高大象倒地能使山頂崩壞而夜叉本身因此擊而哀叫疼痛倒地而死墜入地獄時大目犍連尊者以超人之清淨天眼觀見夜叉擊舍利弗頭即到舍利弗尊者處問言如何汝能忍否疼痛否舍利弗答言目犍連尊者我能忍祇是頭皮有點痛癢大目犍連言舍利弗尊者汝真有大神通大威力真乃神奇之極也舍利弗尊者汝被夜叉一擊這一擊能使七肘高大象倒地能使山頂崩壞而汝卻能忍僅覺頭皮有點痛癢舍利弗言我連一個俾舍遮鬼亦未能看見而目犍連尊者卻看見了夜叉目犍連尊者真有大神通大威力目犍連尊者才真正堪稱神奇此時世尊以超人之清淨天耳聽到此二大弟子談話如是聽已即興而說人若堅如石不動穩如山人怒自不怒人貪己不貪人心能如是何有痛苦言五象經如是我聞一時世尊在憍賞彌瞿師得精舍住時世尊與比丘比丘尼優婆塞優婆夷國王大臣外道外道弟子等共住混雜不堪煩亂不堪諸多不便時世尊思念今我與比丘比丘尼優婆塞優婆夷國王大臣外道外道弟子共住混雜不堪諸多不便我當離群獨居爾時朝時世尊著衣持鉢入憍賞彌乞食乞食已回至住所將坐臥具收拾存放著衣持鉢不告侍從不告比丘僧衆獨自一人無有二者往波利林去依路序行走到達波利林住於附近之護林中一棵名為善良的娑羅樹下時有一象王與諸多牡象牝象小象幼象雜居一處像王吃諸象食去梢頭之草諸象吃象王折下之樹枝像王飲混濁之水像王出水上岸後諸牝象以軀體觸摸象王如此像王煩躁像王想我今與諸多牝象牡象小象幼象雜居一處我所食者為諸象食去梢頭之草諸象所食者為我從樹上折下之枝我所飲為混濁之水我上岸後又有諸牝象以身體觸摸如此與衆混居煩苦不便我當離開群體獨居才是於是象王離開象群來到波利林村護林世尊所住之善良娑羅樹下像王以鼻拔除住地草莽以鼻取水供佛飲用以鼻取物供佛使用世尊獨居清閒自在心想昔日我與比丘比丘尼優婆塞優婆夷國王大臣外道外道弟子混雜而居煩亂不堪今離群獨居離開比丘比丘尼優婆塞優婆夷國王大臣外道外道弟子無有煩亂安樂清靜象王亦想我昔日與牡象牝象小象幼象雜居一處吃諸象食去梢頭之草諸象食我從樹上折下之枝我飲混濁之水出水上岸後諸牝象以身體觸摸煩苦不便今我離開牡象牝象小象幼象可食有梢之草不必折下樹枝供牠們食用可飲不濁之水上岸後亦無牝象以身體觸摸離群獨居確實安祥爾時世尊已知象王心之所念並以己身輕安即興而說象王牙如轅樂於林獨居象王之感受如佛之心意六賓頭盧經如是我聞一時世尊在舍衛城祇樹給孤獨園住時賓頭盧跋羅瓦闍尊者於距佛不遠處上身端直結跏趺坐尊者是位林居者常乞食者著糞掃衣者三衣者少欲知足者清淨獨居者勇猛精進者持頭陀行者增上定心而行持者爾時世尊見賓頭盧跋羅瓦闍尊者於不遠處上身端直結跏趺坐知尊者是位林居者常乞食者著糞掃衣者三衣者少欲知足者清淨獨居者勇猛精進者持頭陀行者增上定心而行持者爾時世尊如是知已即興而說對人不誹謗對人不侵傷守持解脫戒飲食知定量坐臥修禪定止觀遵其道勇猛而精進是諸佛之教七舍利弗經如是我聞一時世尊在舍衛城祇樹給孤獨園住時舍利弗尊者於離佛不遠處上身端直結跏趺坐尊者少欲知足間靜獨處勇猛精進處於羅漢果定中時世尊見舍利弗於不遠處上身端直結跏趺坐知尊者少欲知足間靜獨處勇猛精進處於羅漢果定中爾時世尊如是知已即興而說身懷羅漢心勇猛求精進慧道持戒律正念平靜心不為世法動無憂一聖人八孫陀利經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時世尊受世人供養受崇敬得布施得衣食坐臥具醫藥比丘衆亦受世人供養受崇敬得布施得衣食坐臥具醫藥而諸外道不受世人供養不受崇敬不得布施不得衣食坐臥具醫藥時諸外道不能安忍於佛及比丘僧衆之所得便到外道女孫陀利所而告言妹妹汝願為親族效些力否孫陀利言為了親族我願捨命效力但不知我能有何為外道言汝當常到祇陀林去孫陀利應即常往祇陀林當衆人皆知孫陀利常往祇陀林時諸外道便將他殺死將其尸體埋於祇陀林圍溝中然後往見憍薩羅國王告曰大王我等已不見孫陀利女王曰汝等疑孫陀利應在何處外道言大王祇陀林王曰如是可往祇陀林尋找時諸外道即往祇陀林從圍溝中挖出孫陀利尸體置於床上抬往舍衛城中走街串巷走過每個路口便向人展示言諸位請看釋迦弟子沙門所作之業他們無恥破戒行惡妄語無梵行他們聲稱行善法行沙門法行梵行說真話持戒律修善行而其實他們並無沙門法未去惡行沙門行滅盡梵行滅盡他們行男女淫事事後把女子害死爾時舍衛城人聽信外道言見比丘衆以粗惡語指責辱罵說釋迦子沙門無羞無恥乃至行男女淫事事已殺害女子時諸比丘著衣持鉢到舍衛城乞食乞食回齊食已共往佛所禮世尊已坐於一旁而白佛言大德捨衛城人見比丘衆輒以惡語辱罵說釋迦子無有羞恥乃至行男女淫事事已而殺害女子佛告諸比丘曰如是惡語不會長久多則可存七日七日之後必自消失諸比丘若有人見比丘衆以粗惡語辱罵可以此偈回復人若說妄語必然入地獄做而說未做亦必入地獄二者同為惡下世又相遇諸比丘於佛處學得此偈每遇人辱罵即以此偈回復時諸人衆皆漸醒悟諸釋迦子無有罪過辱罵果未持久七日過後即自消失時諸比丘往至佛所行禮已畢坐於一旁而白佛言大德奇哉奇哉辱罵之聲果未持久七日之後便自消失果如世尊所言爾時世尊如是知已即興而說愚人以語謗猶如箭射象比丘聽惡語無怒忍為上九優波塞那經如是我聞一時佛在王舍城竹林迦蘭陀園住時旺幹得子優波塞那尊者間靜輕安心生是念阿我得大益我有妙得我師乃薄伽梵阿羅漢三藐三菩提我依師尊所教之法律而出家我之善友亦皆梵行之士皆持淨戒行善法我今戒行圓滿一心守定我已是一名漏盡阿羅漢有大神通大威力生亦好死亦好爾時世尊以心得知旺幹得子優波塞那尊者所念如是知已即興而說生不受苦痛死亦無所悲比丘斷有愛心念寂無為已無再生緣徹底斷輪回十舍利弗經如是我聞一時世尊在捨衛城祇樹給孤獨園住爾時舍利弗尊者於離佛不遠處上身端直跏趺而坐觀心寂然清淨爾時世尊見舍利弗尊者於不遠處上身端直跏趺而坐觀心寂然清淨爾時世尊如是知已即興而說比丘心寂靜於生無貪圖輪回已斷盡解脫魔羅縛第四品彌凱耶品終本品總攝十經一彌凱耶經二高慢經三牧牛人經四月明經五象經六賓頭盧經七舍利弗經八孫陀利經九優波塞那經十舍利弗經第五品蘇那長老品一王經如是我聞一時世尊在捨衛城祇樹給孤獨園住時憍薩羅國波斯匿王與末利王妃登至宮殿上層時波斯匿王問末利王妃言末利在汝所愛人中有無勝於愛汝自己者大王無有在我所愛人中無有勝於愛我自己者大王在大王所愛人中有無勝於愛大王自己者也無有末利在我所愛人中也無有勝於愛我自己者波斯匿答言時波斯匿王從殿上層下至地面來至佛所禮世尊已坐於一旁白佛言大德我與末利王妃登至宮殿上層問王妃言末利在汝所愛人中有無勝於愛汝自己者末利王妃答大王在我所愛人中無有勝於愛我自己者末利又問在我所愛人中有無勝於愛我自己者我亦回答說無有爾時世尊如是知已即興自說各方用心尋不見如是人比己更可愛比己更可親人既愛自己不當害他人二短命經如是我聞一時世尊在捨衛城祇樹給孤獨園住爾時夕時阿難尊者從定中起至世尊所禮世尊已坐於一旁白世尊言奇哉奇哉大德世尊世尊之母親竟如此短壽世尊出生七日世尊母親去世生兜率天世尊曰阿難事確如此菩薩之母確實命短菩薩降生七日菩薩母即去世而降生兜率天爾時世尊如是知已即興而說已生之有情未生之有情都必捨肉身肉身必有終賢者知此法努力勤修行三癩病者經如是我聞一時世尊在王舍城竹林迦蘭陀園住爾時王舍城有一個名叫善覺的癩病患者他是王舍城最貧困最低微之人爾時世尊正被衆人圍繞為衆人說法癩病患者善覺於遠處見衆人聚集心想此處必有某種食物分發我若往至亦必可得善覺即至衆人聚處既至見世尊被衆人圍繞正為衆人說法心想此處原來並無食物分發是沙門瞿曇在為衆人說法我既到此亦當一聽即在邊處坐下爾時世尊正以心念尋察觀審看何人最善領悟教法爾時世尊發現坐於邊處之癩病患者善覺即作是念領悟我之教法此人最具善根即針對癩病患者善覺說布施持戒生天之法及貪欲之罪過出離之功德爾時世尊知癩病患者善覺之心具有靈性污垢障礙容易去除即說苦集滅道四聖諦癩病患者聽後即在坐中得無塵法眼證知諸法必有生有滅爾時癩病患者善覺已見法證法悟法達法已去除諸種疑惑已正信堅固住於聖教善覺即從座起走向世尊禮世尊已坐於一旁而白佛言大德教法美妙之極大德教法美妙之極如揭覆蔽如開掩閉如為盲者指路為暗室照明大德我今皈依世尊皈依於法皈依比丘僧團自今日起直至命終是一優婆塞亦望世尊如是看我爾時癩病患者善覺受佛陀法語教示興奮喜悅從坐而起作禮右繞辭別而去離去未久遇一帶犢母牛角抵善覺倒地而死爾時諸比丘往見世尊禮世尊已坐於一旁白世尊言大德癩病患者善覺受佛法語教誨皈依信受興奮喜悅今已死亡他現狀如何來生怎樣世尊答曰諸比丘癩病患者善覺已徹悟正法為學佛法未使我勞苦諸比丘癩病患者善覺已滅除三結證得預流果位不會退轉將來必成正覺世尊說訖一比丘問言大德世尊癩病患者善覺為何如此貧苦如此低微因緣何在世尊答曰諸比丘癩病患者善覺前生曾為王舍城一長者子在園中遊時遇見辟支佛多伽羅悉卡入城托鉢既見心中暗想這個身披袈裟到處遊蕩的癩病患者是誰輕蔑吐唾而去以此想故墜入地獄多年數萬年數千年數十萬年之久因其餘業未盡才為一癩病患者生於王舍城且最貧苦最低微彼聽佛法虔誠皈信謹持戒律修學修捨修慧今身壞命終將生忉利天彼之色身聲譽必過諸神爾時世尊如是說已即興而說智者具慧眼奮勇求精進世間諸罪惡遠離不沾身四兒童經如是我聞一時世尊在捨衛城祇樹給孤獨園住爾時衆多兒童在捨衛城和祇陀林之間捕打遊魚爾時朝時世尊著衣持鉢入城乞食於捨衛城與祇陀林之間見衆多兒童捕打遊魚即上前問曰諸童汝等害怕痛苦否汝等喜歡痛苦否兒童答曰世尊我等害怕痛苦不喜歡痛苦爾時世尊如是知已即興而說怕苦不喜苦明暗莫作惡若有惡業作苦報難逃脫五布薩經如是我聞一時世尊在舍衛城東園彌伽羅堂住時值布薩日比丘衆圍繞佛坐初夜過時阿難從座而起整袈裟衣偏袒一肩向世尊合掌行禮而白世尊言大德世尊初夜已過比丘衆坐等已久請世尊為比丘說波羅提木叉阿難說已世尊默然中夜過時阿難尊者再從座起整袈裟衣偏袒一肩向世尊合掌禮拜而白世尊言大德世尊入夜已久中夜已過比丘衆坐等良久請世尊為比丘說波羅提木叉世尊仍然默不作聲至後夜過去晨曦升起天將亮時阿難從座而起整袈裟衣偏袒一肩向佛合掌禮拜而三告佛言大德世尊後夜已過晨曦升起天將黎明比丘衆坐等已久請世尊為比丘說波羅提木叉爾時佛曰阿難僧團不淨時大目犍連自念世尊說僧團不淨不知所指何人於是大目犍連以心審察每一比丘發現比丘衆中有一人犯有罪過積有惡業非沙門而自稱沙門非梵行而自稱梵行身內污濁貪髒充滿阿難見此人坐於比丘衆中即從座而起趨近而告言世尊已發現汝汝當起汝不當與比丘共住那人聽後默然不動阿難再告世尊已發現汝汝當起汝不當與比丘共住那人仍是默然不動阿難三說那人仍是默然不動大目犍連見此情景便捉其臂膀將其推出門去並關閉門閂大目犍連回見世尊而白佛言大德我已將那人攆出現僧團已淨請為比丘衆說波羅提木叉世尊曰奇哉目犍連奇哉目犍連如此愚人竟強坐比丘衆中直到被攆爾時世尊告比丘曰諸比丘自今以後我不再作布薩不再說波羅提木叉諸比丘今後汝等自作布薩自說波羅提木叉諸比丘僧團不淨如來不作布薩不說波羅提木叉諸比丘大海具有奇妙稀有之八法為阿羅漢所喜愛八法云何一諸比丘大海漸次而深漸次而下而無陡壁懸崖諸阿羅漢見此心生喜愛此為大海所具有之第一奇妙稀有之法二復次諸比丘大海穩健不越海岸諸阿羅漢見而喜愛此為大海所具有之第二奇妙稀有之法三復次諸比丘大海不與死尸共處海中若有尸體必即沖到岸上此亦使阿羅漢見而生喜此為大海所具有之第三奇妙稀有之法四復次諸比丘有大河如恆河雅牟那河阿吉拉瓦底河薩拉菩河摩黑河此諸河一旦流入大海則失原有族姓河名同稱大海阿羅漢見此亦對大海生起喜愛此為大海所具有之第四奇妙稀有之法五復次諸比丘世界諸河皆流入海中雨水亦降落海上但海水並不因此而增減此為大海所具有之第五奇妙稀有之法六復次大海唯有一味即是鹹味此為大海所具有之第六奇妙稀有之法七復次大海中有多種珍寶如珍珠寶石琉璃硨渠珊瑚海貝瑪瑙金銀等此為大海所具之第七奇妙稀有之法八大海為龐大生物居住之處如帝彌魚阿修羅乾闥婆有些軀體龐大可在百由旬二百由旬三百由旬四百由旬五百由旬此為大海所具有之第八奇妙稀有之法大海具此八法而為阿羅漢衆所喜愛所樂住諸比丘衆佛之教法戒律之中亦有八種奇妙稀有之法而為諸比丘所喜愛所樂住八法云何一諸比丘大海漸次而深漸次而下而無陡壁懸崖同樣佛之教法戒律亦是漸次而深故當次第而學次第而行次第而證不可一蹴而就成阿羅漢此為佛教所具第一奇妙稀有之法而為比丘所喜愛所樂住二復次諸比丘大海穩健不越海岸同樣我所制之戒律學處聲聞弟子從不違犯此為佛教所具第二奇妙稀有之法為比丘所喜愛所樂住三復次諸比丘大海不與死尸共處海中若有尸體即沖至岸上同樣如僧團中有人犯戒惡行不淨自稱沙門而非沙門自稱梵行而非梵行內藏污垢貪欲充身僧衆則不與共住比丘衆必聚而共議將其驅除彼雖暫在僧團之中實則遠離僧團僧團亦遠離於彼此為佛教所具第三奇妙稀有之法為衆比丘所喜愛所樂住四復次諸比丘有大河如恆河雅牟那河阿吉拉瓦底河薩拉菩河摩黑河此諸河一旦流入大海則失原有族姓河名同稱大海同樣四種姓之剎帝利婆羅門吠舍首陀羅一旦出家皈依如來之教則失去原有種姓而同稱釋迦子沙門此為佛教所具有之第四奇妙稀有之法為比丘所喜愛所樂住五復次諸比丘世界諸河皆流入海天上雨水亦降落海上但海水並不因此而增減同樣僧團中衆多比丘入於無餘涅槃而涅盤並不因此而增減此為佛教所具第五奇妙稀有之法為比丘所喜愛所樂住六復次諸比丘大海唯有一味即是鹹味同樣佛教亦祇一味即解脫之味此為佛教所具第六奇妙稀有之法為比丘所喜愛所樂住七復次諸比丘大海中有多種珍寶如珍珠寶石琉璃硨渠珊瑚海貝瑪瑙金銀等同樣佛教中亦有多種珍寶如四念住四正勤四神足五根五力七覺支八正道等此為佛教所具第七奇妙稀有之法為比丘所喜愛所樂住八復次諸比丘大海為龐大生物所居之處如帝彌魚阿修羅乾闥婆等有些身軀龐大可有百由旬二百由旬三百由旬四百由旬五百由旬同樣佛教亦為大士所居之處有得預流果者及修預流果之預流向者有得一來果者及修一來果之一來向者有得不還果者及修不還果之不還向者有得羅漢果者及修羅漢果之羅漢向者此為佛教有具第八奇妙稀有之法而為比丘所喜愛所樂住諸比丘佛教中有此八種奇妙稀有之法為比丘所喜愛所樂住爾時世尊如是說已即興而說偈過錯若隱蔽必招大煩惱過錯若公開無憂無煩惱六蘇那經如是我聞一時世尊在捨衛城祇樹給孤獨園住時大迦旃延尊者在阿般提國拘羅羅吒城帕沃得山住有居士蘇那古提幹那供養大迦旃延尊者時蘇那古提幹那居士閒靜自思聖者大迦旃延說法開示我如法悟解思維但因我在家居住不易潔如瑩貝淨修梵行我當剃除鬚髮穿著袈裟出家修行時蘇那古提幹那居士即往大迦旃延尊者所禮尊者已坐於一旁而白尊者言大德我閒靜自思聖者大迦旃延尊者說法開示我如法悟解思維但因我在家居住不易潔如瑩貝淨修梵行我當剃除鬚髮穿著袈裟出家修行請聖者大迦旃延為我剃度如是說已大迦旃延即告蘇那古提幹那居士曰蘇那盡形壽一食獨臥之梵行甚難實行汝可在家依諸佛教誡適時實行一食獨臥之梵行蘇那古提幹那居士即打消出家念頭未久蘇那古提幹那居士間靜自思又起是念聖者大迦旃延說法開示我如法悟解思維但因在家居住不易潔如瑩貝淨修梵行我當剃落鬚髮穿著袈裟出家修行如是思已又至大迦旃延所請求為其披剃大迦旃延尊者再次勸他在家修行蘇那居士出家之念頭再次打消又未久蘇那居士三往大迦旃延所禮尊者已坐於一旁而白尊者言大德我閒靜自思聖者大迦旃延說法開示我如法悟解思維但因在家居住不易潔如瑩貝淨修梵行我當剃除鬚髮穿著袈裟出家修行請聖者大迦旃延為我披剃時大迦旃延尊者即度蘇那古提幹那居士出家時阿般提國南部僅有幾位比丘大迦旃延歷時三年艱辛徵集方得比丘十人為蘇那尊者授具足戒如是度過雨季蘇那尊者於間靜中心生一念我從未親眼見到世尊祇聽人說世尊如是如是若師傅應允我當面見薄伽梵阿羅漢三藐三菩提時蘇那尊者於夕時從定中起往大迦旃延所即至禮尊者畢坐於一旁而白尊者言大德我獨自於間靜處心生一念我從未親眼見到世尊祇聽人說世尊如是如是若師傅應允我當面見薄伽梵阿羅漢三藐三菩提如是言已大迦旃延尊者曰蘇那善哉善哉汝可往見薄伽梵阿羅漢三藐三菩提蘇那世尊諸根清淨令人歡喜心念寂靜最上寂靜最上調御守護諸根是為龍象汝去謁見見時汝當代我頂禮佛足問候世尊無病無災安好無恙如是尊者蘇那歡喜應諾從座而起禮拜師傅行右繞之禮然後收拾坐臥具著衣持鉢遊向捨衛城次弟遊行終到舍衛城祇陀林給孤獨園世尊所既至禮世尊已坐於一旁而白世尊言大德世尊我師大迦旃延頂禮佛足問候世尊無病無災安好無恙世尊問曰比丘汝能安忍否能得供養否遠道而來一路辛苦否蘇那尊者答言大德世尊我能安忍能得供養雖遠道而來並不辛苦爾時世尊告阿難曰阿難為這位客座比丘敷設坐臥具時阿難自念世尊命我為這位新來比丘敷設坐臥具世尊似欲同此蘇那比丘共住於是阿難即於佛處為蘇那比丘敷設坐臥具時世尊於夜間在室外久坐然後洗足入室蘇那尊者也在室外久坐之後才洗足入室天至黎明世尊起身對蘇那尊者曰比丘汝當講說一法如是世尊蘇那應諾即誦說八頌經品的十六部經蘇那尊者頌已世尊曰善哉善哉比丘八頌經品所有十六部經汝已善學善憶並能明其義理聲音亦好響亮無誤語調優美比丘戒臘多少蘇那答曰大德世尊我戒臘一年世尊問曰汝之出家為何延誤許久蘇那答曰大德世尊貪欲之禍患我早已明察因家中諸多俗務未得機緣爾時世尊如是知已即興而說世俗多過失聖者皆能曉深明涅槃法不戀諸惡道七離波多經如是我聞一時世尊在舍衛城祇樹給孤獨園住時多疑離波多尊者於離佛不遠處結跏趺端身正坐以智慧觀察斷除疑惑之清淨爾時世尊見多疑離波多在不遠處結跏趺端身正坐以智慧觀察斷除疑惑之清淨爾時世尊如是知已即興而說今生或他世自身或他身疑惑當斷除去苦以精進修持諸梵行是為修禪人八阿難經如是我聞一時世尊在王舍城竹林迦蘭陀迦園住時布薩日朝時阿難尊者著衣持鉢入王舍城乞食時提婆達多尊者見阿難在王舍城托鉢乞食即往見阿難尊者告言阿難尊者自今日起我將不與世尊及僧衆共作布薩和羯磨阿難從王舍城托鉢回飯食已至世尊所禮世尊已在一旁坐下而白佛言大德我於朝時著衣持鉢入王舍城乞食時提婆達多見我在王舍城乞食便來見我對我言道阿難尊者自今日起我將不與世尊及僧衆共作布薩和羯磨大德世尊提婆達多另作布薩和羯磨是欲分裂僧團爾時世尊如是知已即興而說善人有善舉惡人難為善惡人作惡易善人為惡難九喧譁經如是我聞一時世尊與大比丘衆在憍薩羅國遊化時有衆多青年喧譁吵鬧從世尊不遠處走過世尊見諸青年喧譁吵鬧從不遠處走過爾時世尊如是見已即興而說庸人裝智士喧鬧胡亂講信口開河者不知講不當十槃陀經如是我聞一時世尊在舍衛城祇樹給孤獨園住時周利槃陀尊者於離世尊不遠處結跏趺坐上身端直住面前念爾時世尊見周利槃陀於不遠處結跏趺坐上身端直住現前念爾時世尊如是見已即興而說身亦善安住心亦善安住或立或坐臥正念常持護第五品蘇那長老品終本品總攝十經一王經二短命經三癩病者經四兒童經五布薩經六蘇那經七離波多經八阿難經九喧譁經十槃陀經第六品生盲品一捨壽經如是我聞一時世尊在吠舍離大林鳩吒伽羅講堂住爾時朝時世尊著衣持鉢入吠舍離乞食托鉢回飯食已告阿難曰阿難持我坐具我等去遮頗羅支提小息如是世尊阿難應諾持坐具隨佛後行至遮頗羅支提阿難敷坐具世尊坐已告阿難曰吠捨離甚美優陀那支提甚美瞿曇支提甚美薩曇婆支提甚美多子支提甚美遮頗羅支提甚美阿難修得四神足者增上修者能令為乘為所立堅固積集住於正知如有所望可住世一劫乃至更久阿難如來已修得四神足已增上修能令為樂為所立堅固積集住於正知阿難如來若有所望可住世一劫乃至更久時世
  text: 即興自說鄧殿臣譯題解即興自說是巴利三藏經藏小部尼伽耶中的第三經本經共分為八品每品含十經共為八十經每經由長行和偈頌二部分組成長行是敘述詩體偈頌是佛知見此事體後感興而發之偈頌所以這是一部佛借一事一物向衆生說法的雋永的小經讀起來通俗易懂偈頌部分所含義理又發人深省揭示出佛法在世間不離世間覺的道理經名原作有人轉譯為無問自說有人祇譯為自說因原詞還有感興語之意故譯為即興自說此經依據斯里蘭卡國家佛教部監製出版之僧伽羅文巴利三藏翻譯譯文第一品菩提品那牟薄伽梵阿羅漢三藐三菩提一菩提經一如是我聞一時世尊初成正覺住於優樓頻螺地區尼連禪河畔菩提樹下爾時世尊七日單跏趺坐享解脫之樂經七日已乃從定起於初夜分順思緣起之法此有故彼有此生故彼生緣無明有行緣行有識緣識有名色緣名色有六處緣六處有觸緣觸有受緣受有愛緣愛有取緣取有有緣有有生緣生有老死憂悲苦惱辛如是苦集如是而生爾時世尊如是知已即興自說此偈修禪婆羅門精進斷煩惱悟得緣起法諸疑必盡消二菩提經二如是我聞一時世尊初成正覺住於優樓頻螺地區尼連禪河畔菩提樹下爾時世尊七日單跏趺坐享解脫之樂經七日已乃從定起於中夜分逆思緣起之法此無故彼無此滅故彼滅無明滅則行滅行滅則識滅識滅則名色滅名色滅則六處滅六處滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱辛滅苦集如是而滅爾時世尊如是知已即興自說此偈修禪婆羅門精進斷煩惱悟得緣滅法諸疑必自消三菩提經三如是我聞一時世尊初成正覺住於優樓頻螺地區尼連禪河畔菩提樹下爾時世尊七日單跏趺坐享解脫之樂經七日已乃從定起於後夜分順思逆思緣起之法此有則彼有此生則彼生此無則彼無此滅則彼滅即緣無明有行緣行有識緣識有名色緣名色有六處緣六處有觸緣觸有受緣受有愛緣愛有取緣取有有緣有有生緣生有老死憂悲苦惱辛如是苦集如是而生無明滅則行滅行滅則識滅識滅則名色滅名色滅則六處滅六處滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱辛滅如是苦集如是而滅爾時世尊如是知已即興自說此偈修禪婆羅門精進斷煩惱悟法破魔軍如日當空照四尼拘陀經如是我聞一時世尊初成正覺住於優樓頻螺地區尼連禪河畔尼拘陀榕樹下爾時世尊七日單跏趺坐享解脫之樂七日已乃從定起時有一婆羅門來至佛所與佛歡聚友善話語已畢站立一旁而問佛言尊敬的喬答摩何謂婆羅門婆羅門當為之法是何爾時世尊如是知已即興而說此偈除去罪法無瞋慢斷滅煩惱可安心精於吠陀持梵行於世無貪婆羅門五長老經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時舍利弗尊者大目連尊者大迦葉尊者大迦旃延尊者大拘致羅尊者大卡比那尊者大純陀尊者阿努律陀尊者離越尊者阿難尊者來至佛所世尊遙見諸比丘走來曰諸比丘彼等婆羅門來爾時一婆羅族比丘問世尊世尊何謂婆羅門何謂婆羅門所行之法爾時世尊如是知已發此感興除滅諸罪惡常住於正念斷結而徹悟世上婆羅門六迦葉經如是我聞一時世尊在王舍城竹林迦藍陀園住爾時大迦葉尊者住於畢鉢羅窟病重痛苦後病愈自思我當入王舍城乞食爾時五百天女踴躍而至請尊者托鉢受食大迦葉拒絶五百天女於朝時著衣持鉢入王舍城向窮困之人織工住區托鉢爾時世尊見大迦葉尊者在王舍城窮困之人織工住區托鉢乞食即興說出此偈不受人供不揚名能自調御本神聖諸漏已斷無過失婆羅門者吾尊稱七巴瓦經如是我聞一時世尊在巴瓦城阿闍迦拉波迦鬼庵住爾時世尊於黑夜坐於露天有雨滴降落阿闍迦拉波迦鬼欲恐嚇世尊使世尊毛豎膽驚即來見佛走近佛時便發出怪音阿古拉巴古拉如此三次又說惡鬼來了爾時世尊如是知已即興說此偈陀若有婆羅門法中品位高惡鬼怪聲音小技不足道八戰勝經如是我聞一時世尊在舍衛城祇陀林給孤獨園住爾時桑迦瑪吉尊者來捨衛城探望世尊尊者舊時妻得知尊者已到捨衛城便攜子來至祇園時尊者正在一棵樹下休息妻來到尊者面前告尊者言沙門我們已有此兒汝當養活我們尊者默然不語舊時妻便把兒子放在尊者面前並說此乃汝子當由汝養說完便自離去尊者不視此兒亦不與語舊時妻未走甚遠回頭察視見尊者既不視兒亦不與語自知沙門並無憐子之意即抱子而去世尊以清淨天眼觀見尊者舊時妻之行徑爾時世尊如是知已即興說此偈陀女來無歡喜去亦無所慮我稱婆羅門解脫得勝利九螺髮經如是我聞一時佛在伽耶城住爾時螺髮外道徒衆於寒冷之冬夜雪天在伽耶河中或沉或浮撩水祭火以為以此可得聖潔爾時世尊見彼螺髮外道徒衆於寒冷之冬夜雪天在伽耶河中或沉或浮撩水祭火以為以此可得聖潔爾時世尊如是知已即興說此偈陀靠水豈能得聖潔衆人水中洗其身若得真諦與正法才是聖潔婆羅門十婆希經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時人稱樹皮衣修行者的婆希住於沿海的蘇帕拉卡渡口受人供養受人尊重衣食住藥俱可得到時婆希閒坐於僻靜處心生一念世上如有羅漢或進入羅漢道者我乃其中之一爾時有一天神往世曾為婆希親戚心懷同情樂於助人知婆希所念來至婆希住所告曰婆希汝非羅漢亦未登羅漢果位汝既無羅漢行亦無修羅漢道之行婆希問道現前誰是人天界之阿羅漢誰是修證羅漢道者天神答曰北方邦國有舍衛城那裏有成正等正覺的阿羅漢婆希那位佛世尊還講說修成阿羅漢之正法爾時婆希為天神所動即刻從蘇帕拉卡出發僅一夜時間便經過一切必經之地到達舍衛城祇樹給孤獨精舍爾時諸比丘正在野外經行婆希即到諸比丘處向諸比丘詢問大德那位薄伽梵阿羅漢三藐三菩提現在何處我甚想拜謁那位薄伽梵阿羅漢三藐三菩提諸比丘答曰婆希世尊已入城托鉢婆希即刻離開祇園入舍衛城見世尊托鉢乞食遊行於城內見世尊可親可敬諸根寂靜精神平和自攝自護威儀妙好一大龍象如是見已近至佛處頭面禮足而白佛言大德世尊請為我說法善逝請為我說長遠利益安樂之法婆希如是說已世尊告言婆希此非宜時以入城乞食故婆希再告佛言大德世尊有命難或我有命難實為難知大德世尊請為我說法善逝請為我說長遠利益安樂之法世尊再次告言婆希此非宜時以入城乞食故婆希三告佛言大德世尊有命難或我有命難實為難知大德世尊請為我說法善逝請為我說長遠利益安樂之法爾時世尊說道婆希汝當學此法見唯是見聞唯是聞知唯是知想唯是想婆希此為汝當學之法婆希汝能於見時唯是見於聞時唯是聞於知時唯是知於想時唯是想如是汝可無貪無執汝既無貪無執汝於此世便無再生於下世於此世及下世皆無再生此即是苦盡婆希聽世尊簡短說教執著頓消諸漏盡斷心得解脫爾時世尊向婆希說此簡短教法已便自離去世尊離去未久有一帶犢母牛將婆希抵死於地時世尊在捨衛城托鉢得食用齊已與比丘衆離城回返於途中見婆希已死既見即告衆比丘曰汝等將婆希尸體安放榻上運去荼毗建塔供奉諸比丘此死者是一位梵行者衆比丘答曰如是世尊衆比丘遵囑將婆希尸體安放榻上運去荼毗並造塔後回稟世尊行禮已畢坐在一旁坐已即問世尊大德婆希尸體已經火化並已建塔但不知他有何德行來世又將如何佛曰諸比丘婆希是一位賢者曾依聖法而行並未以問法而惱難於我諸比丘婆希已入涅槃世尊如是說已即興出此偈陀涅槃境界中無地水火風無日月星光無暗亦無明婆羅門牟尼以智自覺醒離色離無色離樂離苦痛第一品菩提品終本品總攝十經一菩提經一二菩提經二三菩提經三四尼拘陀經五長老經六迦葉經七巴瓦經八戰勝經九螺髮經十婆希經第二品目真鄰陀品一目真鄰陀經如是我聞一時世尊初成正覺在優樓頻螺地區尼連禪河畔目真鄰陀樹下住爾時世尊七日單跏趺坐享解脫之樂七日已非時雲起大雨突降寒風來侵持續七日時目真鄰陀龍王從其居處來至佛所以身繞佛七重卷之驤首張頸覆護佛頂龍王自念言寒氣莫侵世尊暑氣莫侵世尊蠅蚊熱風爬蟲莫侵世尊如是經七日世尊始從定起爾時目真鄰陀龍王知天晴無雲乃解卷體龍身消失化為青年立於佛前合掌禮拜爾時世尊如是知已即興說此偈陀居靜是快樂知法是快樂無瞋是快樂憫生是快樂無欲是快樂於世無貪著調伏我慢者是為最上樂二王經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時諸比丘托鉢已回飯食已畢於堂室集坐閒敘摩揭陀國賽尼亞頻毗沙羅王與憍薩羅國波斯匿王相比誰多財物誰多用品誰多寶藏誰多疆土誰多車乘誰多軍力誰多神通誰多威武諸比丘衆如是談論未有終止爾時已近黃昏世尊從定起坐來至堂室敷座而坐問比丘衆諸比丘堂室集坐有何言論汝等談論未終之事是何等事比丘衆白佛言大德世尊我等托鉢已回飯食已畢堂室集坐閒話談敘摩揭陀國王賽尼亞頻毗沙羅王與憍薩羅國波斯匿王相比誰多財物誰多用品誰多寶藏誰多疆土誰多車乘誰多軍力誰多神通誰多威武未終之時世尊至此世尊曰諸比丘族姓子虔誠出家加入僧團如是談論實不應該諸比丘汝等集坐一處當做之事有二一是談說法事二是保持聖潔沉默不語世尊如是說已即興說此偈陀人間和天上有樂有美妙比起涅槃樂微小不足道三杖經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時在舍衛城與祇陀林之間童衆以杖擊蛇時在朝時世尊著衣持鉢往捨衛城乞食於舍衛城與祇陀林間見童衆以杖擊蛇爾時世尊如是見已即興說此偈陀一切衆生靈悉皆喜安康有人自尋樂擊生以棍杖斯人於來世必無安樂享一切衆生靈悉皆喜安康有人自尋樂不欺不他傷斯人於來世必有安樂享四供養經如是我聞一時世尊在舍衛城祇給孤獨園住爾時世尊受人供養受人尊重得衣物飲食臥具藥品及種種什物僧團衆比丘亦受人供養受人尊重得衣物飲食臥具藥品及種種什物而諸外道不受人供養不受人尊重不得衣物飲食臥具藥品及種種什物彼等不能安忍於世尊及衆比丘得諸供養於村莊森林見諸比丘即責難辱罵語言低級粗俗時諸比丘即往佛所行禮已畢坐於一旁白世尊言大德世尊當今之世世尊受人供養受人尊重得衣物飲食臥具藥品及種種什物僧團衆比丘亦受人供養受人尊重得衣物飲食臥具藥品及種種什物而諸外道不受人供養不受人尊重不得衣物飲食臥具藥品及種種什物彼等不能安忍於世尊及衆比丘得諸供養於村莊森林見諸比丘即責難辱罵語言低級粗俗爾時世尊如是知已即興說此偈陀居於村林中無有樂與苦於己於他人苦樂皆緣觸觸因有取蘊無蘊何有觸五居士經如是我聞一時世尊在舍衛城祇樹給孤獨園住爾時伊茶那格拉居士因事入舍衛城居士在舍衛城事畢來至佛所禮佛已畢站立一旁世尊問曰汝已久欲來此居士白佛言大德世尊我思念來此見佛時日已久祇因事務纏身未能早來爾時世尊如是知已即興說此偈陀知法多聞者安樂無